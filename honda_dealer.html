<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honda Bangladesh - Dealer Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }

  /* HEADER */
  .header {
    background: #CC0000;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { color: white; font-size: 18px; font-weight: bold; }
  .header span { color: #ffcccc; font-size: 13px; display: block; }
  .btn-logout {
    background: rgba(255,255,255,0.2);
    color: white;
    border: 1px solid rgba(255,255,255,0.4);
    padding: 7px 16px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.35); }

  /* LOGIN PAGE */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
  }
  .login-card {
    background: white;
    border-radius: 12px;
    padding: 40px 36px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .login-card h2 { color: #CC0000; font-size: 22px; margin-bottom: 6px; }
  .login-card p { color: #888; font-size: 14px; margin-bottom: 28px; }
  .login-card input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #ddd;
    border-radius: 6px;
    font-size: 15px;
    margin-bottom: 14px;
  }
  .login-card input:focus { outline: none; border-color: #CC0000; }
  .btn-login {
    width: 100%;
    padding: 12px;
    background: #CC0000;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-login:hover { background: #aa0000; }
  .login-error { color: #CC0000; font-size: 13px; margin-top: 10px; display: none; }
  .login-error.show { display: block; }

  /* DASHBOARD */
  .dashboard { display: none; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

  /* STATS ROW */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: white;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    border-top: 4px solid #ddd;
  }
  .stat-card.pending { border-top-color: #f39c12; }
  .stat-card.confirmed { border-top-color: #27ae60; }
  .stat-card.completed { border-top-color: #2980b9; }
  .stat-card.total { border-top-color: #CC0000; }
  .stat-card .num { font-size: 32px; font-weight: bold; color: #333; }
  .stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }

  /* FILTERS */
  .filters {
    background: white;
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .filters select, .filters input {
    padding: 8px 12px;
    border: 1.5px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    color: #333;
  }
  .filters select:focus, .filters input:focus { outline: none; border-color: #CC0000; }
  .filters label { font-size: 13px; color: #666; font-weight: bold; }

  /* TABLE */
  .table-wrap {
    background: white;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    overflow-x: auto;
  }
  .table-title {
    padding: 16px 20px;
    font-size: 16px;
    font-weight: bold;
    color: #333;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .btn-refresh {
    background: #f5f5f5;
    border: 1px solid #ddd;
    padding: 6px 14px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    color: #555;
  }
  .btn-refresh:hover { background: #e8e8e8; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th {
    background: #fafafa;
    padding: 12px 14px;
    text-align: left;
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    border-bottom: 1px solid #eee;
    white-space: nowrap;
  }
  td { padding: 13px 14px; border-bottom: 1px solid #f5f5f5; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  /* STATUS BADGES */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
  }
  .badge.pending { background: #fef3cd; color: #856404; }
  .badge.confirmed { background: #d1e7dd; color: #0f5132; }
  .badge.completed { background: #cfe2ff; color: #084298; }
  .badge.cancelled { background: #f8d7da; color: #842029; }

  /* ACTION BUTTONS */
  .action-btn {
    padding: 5px 12px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: bold;
    margin-right: 4px;
    margin-bottom: 4px;
  }
  .btn-confirm { background: #27ae60; color: white; }
  .btn-confirm:hover { background: #1e8449; }
  .btn-complete { background: #2980b9; color: white; }
  .btn-complete:hover { background: #1f6391; }
  .btn-cancel { background: #e74c3c; color: white; }
  .btn-cancel:hover { background: #c0392b; }
  .btn-remark { background: #f39c12; color: white; }
  .btn-remark:hover { background: #d68910; }

  /* MODAL */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: white;
    border-radius: 12px;
    padding: 28px;
    width: 90%;
    max-width: 460px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .modal h3 { font-size: 17px; color: #333; margin-bottom: 16px; }
  .modal textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    min-height: 100px;
    resize: vertical;
    margin-bottom: 16px;
  }
  .modal textarea:focus { outline: none; border-color: #CC0000; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-save { background: #CC0000; color: white; border: none; padding: 9px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
  .btn-close-modal { background: #eee; color: #555; border: none; padding: 9px 20px; border-radius: 5px; cursor: pointer; }

  /* EMPTY / LOADING */
  .empty { text-align: center; padding: 48px; color: #aaa; font-size: 15px; }
  .loading { text-align: center; padding: 40px; color: #999; }

  /* MOBILE */
  @media(max-width: 700px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .filters { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="login-wrap" id="loginPage">
  <div class="login-card">
    <h2>🏍️ Honda Bangladesh</h2>
    <p>Dealer Service Dashboard<br>Sign in with your dealer code</p>
    <input type="text" id="loginCode" placeholder="Dealer Code (e.g. W01X)" style="text-transform:uppercase">
    <input type="password" id="loginPin" placeholder="PIN (default: honda123)">
    <button class="btn-login" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError">Invalid dealer code. Please try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboardPage">
  <div class="header">
    <div>
      <h1>🏍️ Honda Bangladesh — Dealer Dashboard</h1>
      <span id="headerDealerName">Loading...</span>
    </div>
    <button class="btn-logout" onclick="doLogout()">Sign Out</button>
  </div>

  <div class="container">
    <!-- STATS -->
    <div class="stats">
      <div class="stat-card total">
        <div class="num" id="statTotal">0</div>
        <div class="label">Total Bookings</div>
      </div>
      <div class="stat-card pending">
        <div class="num" id="statPending">0</div>
        <div class="label">Pending</div>
      </div>
      <div class="stat-card confirmed">
        <div class="num" id="statConfirmed">0</div>
        <div class="label">Confirmed</div>
      </div>
      <div class="stat-card completed">
        <div class="num" id="statCompleted">0</div>
        <div class="label">Completed</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <label>Filter:</label>
      <select id="filterStatus" onchange="applyFilter()">
        <option value="">All Status</option>
        <option value="pending">Pending</option>
        <option value="confirmed">Confirmed</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <input type="date" id="filterDate" onchange="applyFilter()" placeholder="Filter by date">
      <input type="text" id="filterSearch" oninput="applyFilter()" placeholder="Search name / mobile / chassis...">
    </div>

    <!-- BOOKINGS TABLE -->
    <div class="table-wrap">
      <div class="table-title">
        <span>Appointments</span>
        <button class="btn-refresh" onclick="loadBookings()">↻ Refresh</button>
      </div>
      <div id="tableBody"><div class="loading">Loading bookings...</div></div>
    </div>
  </div>
</div>

<!-- REMARK MODAL -->
<div class="modal-overlay" id="remarkModal">
  <div class="modal">
    <h3>Add / Update Dealer Remarks</h3>
    <textarea id="remarkText" placeholder="Enter your remarks about this booking..."></textarea>
    <div class="modal-btns">
      <button class="btn-close-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveRemark()">Save Remark</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gqqenlxcarksuyskecpk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxcWVubHhjYXJrc3V5c2tlY3BrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTI3OTcsImV4cCI6MjA5NTE2ODc5N30.FDtx3E_Z73EfsHNuFQ_b2hQs44JDkgaxzK-vNtZW7u4';
const DEALER_PIN = 'honda123'; // simple shared PIN for now

const headers = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY
};

let currentDealer = null;
let allBookings = [];
let remarkBookingId = null;

// ── LOGIN ──
async function doLogin() {
  const code = document.getElementById('loginCode').value.trim().toUpperCase();
  const pin  = document.getElementById('loginPin').value.trim();
  const err  = document.getElementById('loginError');
  err.classList.remove('show');
  if (!code) { err.textContent = 'Please enter your dealer code.'; err.classList.add('show'); return; }
  if (pin !== DEALER_PIN) { err.textContent = 'Incorrect PIN. Please try again.'; err.classList.add('show'); return; }
  const res = await fetch(`${SUPABASE_URL}/rest/v1/dealers?dealer_code=eq.${code}&select=*`, { headers });
  const data = await res.json();
  if (!data.length) { err.textContent = 'Dealer code not found. Please check and try again.'; err.classList.add('show'); return; }
  currentDealer = data[0];
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('dashboardPage').style.display = 'block';
  document.getElementById('headerDealerName').textContent = currentDealer.dealer_name + ' — ' + currentDealer.district;
  loadBookings();
}

document.getElementById('loginCode').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('loginPin').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogout() {
  currentDealer = null; allBookings = [];
  document.getElementById('dashboardPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginCode').value = '';
  document.getElementById('loginPin').value = '';
}

// ── LOAD BOOKINGS ──
async function loadBookings() {
  document.getElementById('tableBody').innerHTML = '<div class="loading">Loading...</div>';
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/bookings?dealer_code=eq.${currentDealer.dealer_code}&order=created_at.desc&select=*`,
    { headers }
  );
  allBookings = await res.json();
  updateStats();
  applyFilter();
}

function updateStats() {
  document.getElementById('statTotal').textContent     = allBookings.length;
  document.getElementById('statPending').textContent   = allBookings.filter(b=>b.status==='pending').length;
  document.getElementById('statConfirmed').textContent = allBookings.filter(b=>b.status==='confirmed').length;
  document.getElementById('statCompleted').textContent = allBookings.filter(b=>b.status==='completed').length;
}

function applyFilter() {
  const status = document.getElementById('filterStatus').value;
  const date   = document.getElementById('filterDate').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  let filtered = allBookings;
  if (status) filtered = filtered.filter(b => b.status === status);
  if (date)   filtered = filtered.filter(b => b.appointment_date === date);
  if (search) filtered = filtered.filter(b =>
    (b.customer_name||'').toLowerCase().includes(search) ||
    (b.mobile||'').includes(search) ||
    (b.chassis_no||'').toLowerCase().includes(search)
  );
  renderTable(filtered);
}

// ── RENDER TABLE ──
const SERVICE_NAMES = {1:'Free Service - 1st',2:'Free Service - 2nd',3:'Free Service - 3rd',4:'Paid Service',5:'General Repair'};

function renderTable(bookings) {
  if (!bookings.length) {
    document.getElementById('tableBody').innerHTML = '<div class="empty">No bookings found.</div>';
    return;
  }
  let html = `<table>
    <thead><tr>
      <th>#</th><th>Date & Time</th><th>Customer</th><th>Chassis</th>
      <th>Service</th><th>Remarks</th><th>Status</th><th>Actions</th>
    </tr></thead><tbody>`;
  bookings.forEach(b => {
    const dt = new Date(b.appointment_date);
    const dateStr = dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
    const svcName = SERVICE_NAMES[b.service_type_id] || '-';
    const badge = `<span class="badge ${b.status}">${capitalize(b.status)}</span>`;
    const customerRemarks = b.remarks ? `<small style="color:#888">${b.remarks}</small>` : '';
    const dealerRemarks   = b.dealer_remarks ? `<br><small style="color:#2980b9">📝 ${b.dealer_remarks}</small>` : '';

    let actions = '';
    if (b.status === 'pending') {
      actions += `<button class="action-btn btn-confirm" onclick="updateStatus(${b.id},'confirmed')">✔ Confirm</button>`;
      actions += `<button class="action-btn btn-cancel" onclick="updateStatus(${b.id},'cancelled')">✖ Cancel</button>`;
    }
    if (b.status === 'confirmed') {
      actions += `<button class="action-btn btn-complete" onclick="updateStatus(${b.id},'completed')">✔ Complete</button>`;
      actions += `<button class="action-btn btn-cancel" onclick="updateStatus(${b.id},'cancelled')">✖ Cancel</button>`;
    }
    actions += `<button class="action-btn btn-remark" onclick="openRemark(${b.id},'${(b.dealer_remarks||'').replace(/'/g,"\\'")}')">✏ Remark</button>`;

    html += `<tr>
      <td><strong>#${b.id}</strong><br><small style="color:#aaa">${formatAgo(b.created_at)}</small></td>
      <td><strong>${dateStr}</strong><br>${b.appointment_time}</td>
      <td><strong>${b.customer_name}</strong><br>${b.mobile}${b.email ? '<br><small>'+b.email+'</small>' : ''}</td>
      <td style="font-family:monospace;font-size:13px">${b.chassis_no}</td>
      <td>${svcName}</td>
      <td>${customerRemarks}${dealerRemarks}</td>
      <td>${badge}</td>
      <td style="white-space:nowrap">${actions}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('tableBody').innerHTML = html;
}

// ── UPDATE STATUS ──
async function updateStatus(id, newStatus) {
  const label = newStatus === 'confirmed' ? 'confirm' : newStatus === 'completed' ? 'mark as completed' : 'cancel';
  if (!confirm(`Are you sure you want to ${label} booking #${id}?`)) return;
  const body = { status: newStatus };
  if (newStatus === 'confirmed') body.confirmed_time = new Date().toISOString();
  await fetch(`${SUPABASE_URL}/rest/v1/bookings?id=eq.${id}`, {
    method: 'PATCH',
    headers,
    body: JSON.stringify(body)
  });
  loadBookings();
}

// ── REMARKS ──
function openRemark(id, existing) {
  remarkBookingId = id;
  document.getElementById('remarkText').value = existing || '';
  document.getElementById('remarkModal').classList.add('show');
}
function closeModal() {
  document.getElementById('remarkModal').classList.remove('show');
  remarkBookingId = null;
}
async function saveRemark() {
  const text = document.getElementById('remarkText').value.trim();
  await fetch(`${SUPABASE_URL}/rest/v1/bookings?id=eq.${remarkBookingId}`, {
    method: 'PATCH',
    headers,
    body: JSON.stringify({ dealer_remarks: text })
  });
  closeModal();
  loadBookings();
}

// ── HELPERS ──
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function formatAgo(ts) {
  const diff = Math.floor((Date.now() - new Date(ts)) / 60000);
  if (diff < 1) return 'just now';
  if (diff < 60) return diff + 'm ago';
  if (diff < 1440) return Math.floor(diff/60) + 'h ago';
  return Math.floor(diff/1440) + 'd ago';
}
</script>
</body>
</html>
